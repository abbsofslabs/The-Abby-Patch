services:
  - type: web
    name: abby-patch-checkout
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_SINGLE
        sync: false
      - key: STRIPE_PRICE_SUB
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_SAM2_MODEL
        value: lucataco/segment-anything-2
