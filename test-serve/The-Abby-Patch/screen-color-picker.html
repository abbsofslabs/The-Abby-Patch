<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pick a color — The Abby Patch</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: Georgia, 'Times New Roman', serif;
        color: #3d2e26;
        background: #f5f2e9;
      }

      main {
        width: 100%;
        max-width: 280px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      p {
        margin: 0;
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        line-height: 1.5;
        color: #5c4638;
      }

      button {
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.85rem 1rem;
        border: 2px solid #3d2e26;
        border-radius: 999px;
        background: linear-gradient(180deg, #8da080 0%, #6f8562 100%);
        color: #f5f2e9;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .swatch {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto;
        border: 2px solid #3d2e26;
        border-radius: 8px;
        background: #fff;
      }

      .hex {
        font-family: ui-monospace, monospace;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .error {
        color: #8b3a3a;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pick a color</h1>
      <p>Click below, then click any color on your screen — even in another window.</p>
      <div class="swatch" id="swatch" hidden></div>
      <p class="hex" id="hex" hidden></p>
      <button type="button" id="pick">Sample color</button>
      <p class="error" id="error" hidden></p>
    </main>
    <script>
      const pickButton = document.getElementById('pick');
      const swatch = document.getElementById('swatch');
      const hexLabel = document.getElementById('hex');
      const errorEl = document.getElementById('error');

      if (!window.EyeDropper) {
        errorEl.hidden = false;
        errorEl.textContent =
          'Screen color picking needs Chrome or Edge. You can close this window and use the color wheel instead.';
        pickButton.disabled = true;
      }

      pickButton.addEventListener('click', async () => {
        try {
          const eyeDropper = new EyeDropper();
          const result = await eyeDropper.open();
          const color = result.sRGBHex;

          swatch.hidden = false;
          hexLabel.hidden = false;
          swatch.style.backgroundColor = color;
          hexLabel.textContent = color.toUpperCase();

          if (window.opener) {
            window.opener.postMessage({ type: 'abby-patch-color', color }, window.location.origin);
          }
        } catch (err) {
          if (err && err.name !== 'AbortError') {
            errorEl.hidden = false;
            errorEl.textContent = 'Could not pick a color. Please try again.';
          }
        }
      });
    </script>
  </body>
</html>
